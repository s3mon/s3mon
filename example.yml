---
s3mon:
  endpoint: https://s3.provider.tld # full URL; if using AWS just define the region
  region: eu-central-1 # set for AWS and custom endpoints; many vendors accept any non-empty label
  access_key: ACCESS_KEY_ID
  secret_key: SECRET_ACCESS_KEY
  buckets:
    bucket_A:
      - prefix: test
        suffix: .log
        age: 86400
        size: 30720
    bucket_B:
      - prefix: foo
        age: 43200
        size: 1024
      - prefix: path/start/with/test
        age: 43200
